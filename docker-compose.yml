services:
  predictive-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: jackbot/predictive-service:latest
    container_name: jackbot-predictive-service
    ports:
      - "${PREDICTIVE_PORT:-8080}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    mem_limit: 512m
    mem_reservation: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: curl -f http://localhost:8080/actuator/health | grep -q '"status":"UP"'
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - jackbot-network

networks:
  jackbot-network:
    driver: bridge
    name: jackbot-network          # nome fixo para compatibilidade com o compose central da Dupla 3


server:
  port: ${PREDICTIVE_PORT:8080}

spring:
  application:
    name: predictive-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
  api-docs:
    path: /v3/api-docs

prediction:
  stub-model-version: "stub-v1.0"

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
